<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Ops Portal — James</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-card-hover: #222222;
      --bg-secondary: #161616;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #555;
      --accent-railway: #7C3AED;
      --accent-railway-light: #EDE9FE;
      --accent-railway-text: #5B21B6;
      --accent-laravel: #FF2D20;
      --accent-laravel-light: #FEE2E0;
      --accent-laravel-text: #991B1B;
      --green: #16a34a;
      --green-bg: #052e16;
      --green-text: #4ade80;
      --red: #dc2626;
      --red-bg: #2d0a0a;
      --red-text: #f87171;
      --gray-bg: #1f1f1f;
      --gray-text: #666;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f5;
        --bg-card: #ffffff;
        --bg-card-hover: #f9f9f9;
        --bg-secondary: #efefef;
        --border: rgba(0,0,0,0.08);
        --border-hover: rgba(0,0,0,0.15);
        --text-primary: #111;
        --text-secondary: #555;
        --text-muted: #aaa;
        --accent-railway-light: #EDE9FE;
        --accent-railway-text: #5B21B6;
        --accent-laravel-light: #FEE2E0;
        --accent-laravel-text: #991B1B;
        --green-bg: #f0fdf4;
        --green-text: #166534;
        --red-bg: #fef2f2;
        --red-text: #991b1b;
        --gray-bg: #f3f4f6;
        --gray-text: #9ca3af;
      }
    }

    html, body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .portal {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .header-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .header-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 4px;
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 0.875rem;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-bar {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px;
      background: var(--bg-card);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-bar::placeholder { color: var(--text-muted); }
    .search-bar:focus { border-color: var(--border-hover); }

    /* Filters */
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .filter-btn:active { transform: scale(0.97); }
    .filter-btn.active {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }

    /* Platform section */
    .platform-section { margin-bottom: 1.5rem; }
    .platform-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.625rem;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .platform-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .dot-railway { background: var(--accent-railway); }
    .dot-laravel { background: var(--accent-laravel); }

    /* App card */
    .app-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.875rem 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .app-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
    .app-card:active { transform: scale(0.99); }

    .app-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .app-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .av-railway {
      background: var(--accent-railway-light);
      color: var(--accent-railway-text);
    }
    .av-laravel {
      background: var(--accent-laravel-light);
      color: var(--accent-laravel-text);
    }

    @media (prefers-color-scheme: dark) {
      .av-railway { background: #2e1065; color: #c4b5fd; }
      .av-laravel { background: #450a0a; color: #fca5a5; }
    }

    .app-info { min-width: 0; }
    .app-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .app-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* Status badges */
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .badge-ok { background: var(--green-bg); color: var(--green-text); }
    .badge-crash { background: var(--red-bg); color: var(--red-text); }
    .badge-never { background: var(--gray-bg); color: var(--gray-text); }

    .arrow {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1;
    }

    /* Github link inside card */
    .gh-link {
      display: inline-flex;
      align-items: center;
      color: var(--text-muted);
      text-decoration: none;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .gh-link:hover { color: var(--text-secondary); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 0.5rem; }

    /* Crash banner */
    .crash-banner {
      background: var(--red-bg);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--red-text);
    }
    .crash-banner svg { flex-shrink: 0; }

    /* Pulse dot for crash */
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
<div class="portal">

  <div class="header">
    <div>
      <div class="header-title">Mis Apps</div>
      <div class="header-sub" id="last-updated">Cargando...</div>
    </div>
    <div class="header-count" id="app-count">0 apps</div>
  </div>

  <div id="crash-banner" style="display:none;" class="crash-banner">
    <div class="pulse-dot"></div>
    <span id="crash-msg"></span>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-bar" type="search" id="search" placeholder="Buscar app..." oninput="render()" autocomplete="off" />
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('railway', this)">Railway</button>
    <button class="filter-btn" onclick="setFilter('laravel', this)">Laravel Cloud</button>
    <button class="filter-btn" onclick="setFilter('crash', this)">Con errores</button>
  </div>

  <div id="app-list"></div>

</div>

<script>
  // ─── EDITA AQUÍ TUS APPS ────────────────────────────────────────────────────
  // platform: 'railway' | 'laravel'
  // status:   'ok' | 'crash' | 'never'
  // url:      URL directa al dashboard de la app en Railway o Laravel Cloud
  // github:   URL al repo en GitHub (opcional, deja '' si no aplica)
  const APPS = [
    // Railway
    { name: 'NominaeduN',           initials: 'NN', platform: 'railway', status: 'ok',    desc: 'SaaS educativo — NestJS + Prisma',          url: 'https://railway.app',                             github: 'https://github.com/jamesmosq' },
    { name: 'Secretaria Salud',     initials: 'SS', platform: 'railway', status: 'ok',    desc: '2/2 servicios online',                       url: 'https://railway.app',                             github: '' },
    { name: 'ContaEdu',             initials: 'CE', platform: 'railway', status: 'ok',    desc: 'Contabilidad educativa',                     url: 'https://railway.app',                             github: 'https://github.com/jamesmosq/contaedu' },
    { name: 'SstEdu',               initials: 'SE', platform: 'railway', status: 'ok',    desc: '2/2 servicios online',                       url: 'https://railway.app',                             github: '' },
    { name: 'saar-CRM',             initials: 'SC', platform: 'railway', status: 'ok',    desc: 'CRM en Ruby on Rails',                       url: 'https://railway.app',                             github: '' },
    { name: 'Comparador',           initials: 'CO', platform: 'railway', status: 'ok',    desc: 'Agrupador llamadas de asistencia',           url: 'https://railway.app',                             github: 'https://github.com/jamesmosq/comparador' },
    { name: 'Lacarta',              initials: 'LC', platform: 'railway', status: 'ok',    desc: 'Primera SaaS con Laravel',                  url: 'https://railway.app',                             github: 'https://github.com/jamesmosq/lacarta' },
    { name: 'Diagnóstico Comercial',initials: 'DC', platform: 'railway', status: 'crash', desc: '1/2 servicio caído',                         url: 'https://railway.app',                             github: '' },

    // Laravel Cloud
    { name: 'cfitam',     initials: 'CF', platform: 'laravel', status: 'ok',    desc: 'Sitio institucional CEFIT',              url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/cfitam' },
    { name: 'contaedu',   initials: 'CE', platform: 'laravel', status: 'ok',    desc: 'Actualizado hace 20 horas',             url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/contaedu' },
    { name: 'lacarta',    initials: 'LC', platform: 'laravel', status: 'ok',    desc: 'Avances controllers, models, views',    url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/lacarta' },
    { name: 'comparador', initials: 'CO', platform: 'laravel', status: 'never', desc: 'Nunca desplegado',                      url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/comparador' },
    { name: 'completo',   initials: 'CP', platform: 'laravel', status: 'ok',    desc: 'Sembrando seeder y listo',              url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/completo' },
    { name: 'diplomado',  initials: 'DI', platform: 'laravel', status: 'ok',    desc: 'First commit',                         url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/diplomado' },
    { name: 'produccion', initials: 'PR', platform: 'laravel', status: 'ok',    desc: 'Subiendo proyecto a cloud',            url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/produccion' },
    { name: 'subiendo',   initials: 'SU', platform: 'laravel', status: 'ok',    desc: 'Update admin credentials',             url: 'https://cloud.laravel.com/org/james-mosquera-renteria/applications', github: 'https://github.com/jamesmosq/subiendo' },
  ];
  // ────────────────────────────────────────────────────────────────────────────

  let activeFilter = 'all';

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function badge(status) {
    if (status === 'ok')    return '<span class="badge badge-ok">online</span>';
    if (status === 'crash') return '<span class="badge badge-crash">caído</span>';
    return '<span class="badge badge-never">sin deploy</span>';
  }

  function ghIcon(url) {
    if (!url) return '';
    return `<a class="gh-link" href="${url}" target="_blank" title="Ver en GitHub" onclick="event.stopPropagation()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.483
          0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466
          -.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832
          .092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688
          -.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844a9.59 9.59 0
          012.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595
          1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012
          2.747 0 .268.18.58.688.482A10.02 10.02 0 0022 12c0-5.523-4.477-10-10-10z"/>
      </svg>
    </a>`;
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const filtered = APPS.filter(a => {
      const matchQ = !q || a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q);
      const matchF = activeFilter === 'all'
        || activeFilter === a.platform
        || (activeFilter === 'crash' && a.status === 'crash');
      return matchQ && matchF;
    });

    // crash banner
    const crashed = APPS.filter(a => a.status === 'crash');
    const banner = document.getElementById('crash-banner');
    if (crashed.length > 0) {
      banner.style.display = 'flex';
      document.getElementById('crash-msg').textContent =
        crashed.length === 1
          ? `"${crashed[0].name}" tiene 1 servicio caído`
          : `${crashed.length} apps con servicios caídos`;
    } else {
      banner.style.display = 'none';
    }

    document.getElementById('app-count').textContent = filtered.length + ' apps';

    const railway = filtered.filter(a => a.platform === 'railway');
    const laravel  = filtered.filter(a => a.platform === 'laravel');

    let html = '';

    if (railway.length) {
      html += `<div class="platform-section">
        <div class="platform-label"><span class="platform-dot dot-railway"></span>Railway</div>`;
      railway.forEach(a => {
        html += `<a class="app-card" href="${a.url}" target="_blank" rel="noopener">
          <div class="app-left">
            <div class="app-avatar av-railway">${a.initials}</div>
            <div class="app-info">
              <div class="app-name">${a.name}</div>
              <div class="app-desc">${a.desc}</div>
            </div>
          </div>
          <div class="app-right">
            ${ghIcon(a.github)}
            ${badge(a.status)}
            <span class="arrow">›</span>
          </div>
        </a>`;
      });
      html += '</div>';
    }

    if (laravel.length) {
      html += `<div class="platform-section">
        <div class="platform-label"><span class="platform-dot dot-laravel"></span>Laravel Cloud</div>`;
      laravel.forEach(a => {
        html += `<a class="app-card" href="${a.url}" target="_blank" rel="noopener">
          <div class="app-left">
            <div class="app-avatar av-laravel">${a.initials}</div>
            <div class="app-info">
              <div class="app-name">${a.name}</div>
              <div class="app-desc">${a.desc}</div>
            </div>
          </div>
          <div class="app-right">
            ${ghIcon(a.github)}
            ${badge(a.status)}
            <span class="arrow">›</span>
          </div>
        </a>`;
      });
      html += '</div>';
    }

    if (!html) {
      html = `<div class="empty">
        <div class="empty-icon">🔍</div>
        Sin resultados para "<strong>${q}</strong>"
      </div>`;
    }

    document.getElementById('app-list').innerHTML = html;
  }

  // Timestamp
  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Actualizado ' + now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });

  render();
</script>
</body>
</html>
