<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A" />
  <meta name="description" content="Monitor de apps desplegadas en Railway y Laravel Cloud" />
  <title>OpsPortal — James</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="portal">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
      </div>
      <div>
        <div class="header-title">ops-portal</div>
        <div class="header-sub">
          <span class="live-dot" aria-hidden="true"></span>
          <span id="last-updated">—</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar" role="status" aria-live="polite"></div>

  <!-- Crash banner -->
  <div class="crash-banner" id="crash-banner" role="alert">
    <div class="pulse-dot" aria-hidden="true"></div>
    <span id="crash-msg"></span>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      class="search-bar"
      type="search"
      id="search"
      placeholder="buscar app..."
      oninput="render()"
      autocomplete="off"
      aria-label="Buscar aplicación"
    />
  </div>

  <!-- Filters -->
  <nav class="filter-row" aria-label="Filtrar por plataforma">
    <button class="filter-btn active" onclick="setFilter('all', this)">todas</button>
    <button class="filter-btn" onclick="setFilter('railway', this)">railway</button>
    <button class="filter-btn" onclick="setFilter('laravel', this)">laravel cloud</button>
    <button class="filter-btn" onclick="setFilter('crash', this)">con errores</button>
  </nav>

  <!-- App list -->
  <main id="app-list" aria-live="polite"></main>

</div>

<script src="app.js"></script>
</body>
</html>
