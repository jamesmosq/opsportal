<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A" />
  <meta name="description" content="Monitor de apps desplegadas en Railway y Laravel Cloud" />
  <title>OpsPortal — JamesDev</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="portal">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
      </div>
      <div>
        <div class="header-title">ops-portal</div>
        <div class="header-sub">
          <span class="live-dot" aria-hidden="true"></span>
          <span id="last-updated">—</span>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refresh-btn" title="Actualizar estado desde Railway" onclick="refreshAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar" role="status" aria-live="polite"></div>

  <!-- Crash banner -->
  <div class="crash-banner" id="crash-banner" role="alert">
    <div class="pulse-dot" aria-hidden="true"></div>
    <span id="crash-msg"></span>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      class="search-bar"
      type="search"
      id="search"
      placeholder="buscar app..."
      oninput="render()"
      autocomplete="off"
      aria-label="Buscar aplicación"
    />
  </div>

  <!-- Filters (los botones de plataforma se generan desde PLATFORMS en app.js) -->
  <nav class="filter-row" id="filter-row" aria-label="Filtrar por plataforma">
    <button class="filter-btn active" data-filter="all"   onclick="setFilter('all', this)">todas</button>
    <!-- botones de plataforma inyectados por JS -->
    <button class="filter-btn"        data-filter="crash" onclick="setFilter('crash', this)">con errores</button>
    <button class="filter-btn"        data-filter="never" onclick="setFilter('never', this)">sin deploy</button>
  </nav>

  <!-- App list -->
  <main id="app-list" aria-live="polite"></main>

</div>

<!-- FAB agregar app -->
<button class="fab" title="Agregar app" onclick="showAddModal()" aria-label="Agregar nueva app">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
    <path d="M12 5v14M5 12h14"/>
  </svg>
</button>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>


<!-- Modal: Editar App -->
<div class="modal-bg" id="edit-modal" aria-modal="true" role="dialog" aria-label="Editar app">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Editar aplicación</span>
      <button class="modal-close" onclick="closeEditModal()" aria-label="Cerrar">×</button>
    </div>
    <input type="hidden" id="edit-id" />
    <div class="form-grid">
      <div class="form-group">
        <label for="edit-name">Nombre</label>
        <input type="text" id="edit-name" placeholder="Mi App" />
      </div>
      <div class="form-group">
        <label for="edit-initials">Iniciales</label>
        <input type="text" id="edit-initials" placeholder="MA" maxlength="2" />
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label for="edit-platform">Plataforma</label>
        <select id="edit-platform"></select>
      </div>
      <div class="form-group">
        <label for="edit-status">Estado</label>
        <select id="edit-status">
          <option value="ok">online</option>
          <option value="crash">crashed</option>
          <option value="never">sin deploy</option>
          <option value="building">building</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label for="edit-desc">Descripción</label>
      <input type="text" id="edit-desc" placeholder="SaaS en NestJS..." />
    </div>
    <div class="form-group">
      <label for="edit-url">URL del dashboard</label>
      <input type="url" id="edit-url" placeholder="https://railway.app/project/..." />
    </div>
    <div class="form-group">
      <label for="edit-github">GitHub (opcional)</label>
      <input type="url" id="edit-github" placeholder="https://github.com/usuario/repo" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeEditModal()">cancelar</button>
      <button class="btn btn-primary" onclick="saveEditApp()">guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Agregar App -->
<div class="modal-bg" id="add-modal" aria-modal="true" role="dialog" aria-label="Agregar nueva app">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Agregar aplicación</span>
      <button class="modal-close" onclick="closeAddModal()" aria-label="Cerrar">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label for="add-name">Nombre</label>
        <input type="text" id="add-name" placeholder="Mi App" />
      </div>
      <div class="form-group">
        <label for="add-initials">Iniciales</label>
        <input type="text" id="add-initials" placeholder="MA" maxlength="2" />
      </div>
    </div>
    <div class="form-group">
      <label for="add-platform">Plataforma</label>
      <select id="add-platform">
        <!-- opciones generadas desde PLATFORMS en app.js -->
      </select>
    </div>
    <div class="form-group">
      <label for="add-desc">Descripción</label>
      <input type="text" id="add-desc" placeholder="SaaS en NestJS..." />
    </div>
    <div class="form-group">
      <label for="add-url">URL del dashboard</label>
      <input type="url" id="add-url" placeholder="https://railway.app/project/..." />
    </div>
    <div class="form-group">
      <label for="add-github">GitHub (opcional)</label>
      <input type="url" id="add-github" placeholder="https://github.com/usuario/repo" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">cancelar</button>
      <button class="btn btn-primary" onclick="saveApp()">agregar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
